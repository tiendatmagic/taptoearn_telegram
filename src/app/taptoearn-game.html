<div
  class="relative flex flex-col items-center justify-center min-h-[70vh] w-full bg-gradient-to-b from-fuchsia-100 via-pink-50 to-white py-10 px-4 overflow-hidden"
>
  <div class="w-full max-w-md mx-auto">
    <h2
      class="md:text-4xl bg-clip-text bg-gradient-to-r from-pink-500 via-fuchsia-500 to-orange-500 mb-4 text-3xl font-extrabold tracking-tight text-center text-transparent"
    >
      Tap to Earn
    </h2>

    <div
      class="bg-white/90 rounded-2xl border-pink-50 backdrop-blur-sm flex flex-col items-center gap-3 px-6 py-5 mb-6 border shadow-md"
    >
      <div class="text-xs text-gray-500">Telegram User ID: {{ telegramUserId() }}</div>
      <div class="text-lg font-semibold text-gray-700">
        Score: <span class="text-pink-600">{{ score() }}</span>
      </div>
      @if (lastTap()) {
        <div class="text-xs text-gray-400">Last tap: {{ lastTap()?.toLocaleTimeString() }}</div>
      }
      @if (error()) {
        <div class="text-xs text-red-600">{{ error() }}</div>
      }
    </div>

    <button
      class="md:px-16 md:py-10 bg-gradient-to-br from-yellow-400 via-pink-500 to-fuchsia-600 hover:from-yellow-300 hover:to-fuchsia-700 md:shadow-2xl md:text-4xl focus:outline-none focus:ring-4 active:scale-95 hover:scale-105 md:gap-4 md:border-4 border-white/60 relative flex items-center justify-center w-full gap-3 px-8 py-6 mb-4 text-2xl font-extrabold text-white transition-transform duration-150 border-2 rounded-full shadow-lg"
      (click)="tap()"
      [disabled]="isBootstrapping()"
      aria-label="Tap to earn"
    >
      <span>TAP!</span>
    </button>
  </div>
</div>
