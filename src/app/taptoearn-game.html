<div
  class="relative flex flex-col items-center justify-center min-h-[70vh] w-full bg-gradient-to-b from-fuchsia-100 via-pink-50 to-white py-10 px-4 overflow-hidden"
>
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none select-none">
    <div
      class="animate-pulse left-10 top-10 blur-2xl opacity-30 absolute w-16 h-16 bg-yellow-300 rounded-full"
    ></div>
    <div
      class="animate-pulse right-10 bottom-10 blur-2xl opacity-20 absolute w-24 h-24 bg-pink-300 rounded-full"
    ></div>
    <div
      class="animate-pulse left-1/2 top-1/3 blur-2xl opacity-20 absolute w-20 h-20 bg-orange-200 rounded-full"
    ></div>
  </div>
  <div class="w-full max-w-md mx-auto">
    <h2
      class="md:text-4xl bg-clip-text bg-gradient-to-r from-pink-500 via-fuchsia-500 to-purple-500 mb-4 text-3xl font-extrabold tracking-tight text-center text-transparent"
    >
      Tap to Earn
    </h2>
    <div
      class="bg-white/85 rounded-2xl border-pink-50 backdrop-blur-sm flex flex-col items-center gap-3 px-6 py-5 mb-6 border shadow-md"
    >
      <div class="flex items-center gap-2 text-lg font-semibold text-gray-700">
        <svg
          class="animate-spin w-6 h-6 text-yellow-400"
          fill="currentColor"
          viewBox="0 0 20 20"
          aria-hidden="true"
        >
          <path
            d="M10 15.27L16.18 18l-1.64-7.03L20 7.24l-7.19-.61L10 0 7.19 6.63 0 7.24l5.46 3.73L3.82 18z"
          />
        </svg>
        Số lần nhấn: <span class="text-pink-600">{{ score() }}</span>
      </div>
      <div class="flex items-center gap-2 text-lg font-semibold text-gray-700">
        <svg
          class="text-amber-400 animate-pulse w-6 h-6"
          fill="currentColor"
          viewBox="0 0 20 20"
          aria-hidden="true"
        >
          <circle cx="10" cy="10" r="8" />
        </svg>
        Số coin: <span class="text-green-600">{{ earning() }}</span>
      </div>
      @if (lastTap()) {
        <div class="text-xs text-gray-400">
          Lần nhấn cuối: {{ lastTap()?.toLocaleTimeString() }}
        </div>
      }
    </div>
    <button
      class="md:px-16 md:py-10 bg-gradient-to-br from-yellow-400 via-pink-500 to-fuchsia-600 hover:from-yellow-300 hover:to-fuchsia-700 md:shadow-2xl md:text-4xl focus:outline-none focus:ring-4 md:focus:ring-8 active:scale-95 hover:scale-105 md:gap-4 md:border-4 border-white/60 relative flex items-center gap-3 px-8 py-6 mb-4 text-2xl font-extrabold text-white transition-transform duration-150 border-2 rounded-full shadow-lg"
      (click)="tap()"
      aria-label="Tap để kiếm tiền"
    >
      <svg
        class="md:w-10 md:h-10 drop-shadow-lg animate-pulse w-8 h-8 mr-2 text-yellow-200"
        fill="currentColor"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          d="M12 2a1 1 0 0 1 1 1v8h8a1 1 0 1 1 0 2h-8v8a1 1 0 1 1-2 0v-8H3a1 1 0 1 1 0-2h8V3a1 1 0 0 1 1-1z"
        />
      </svg>
      TAP!
    </button>
  </div>
</div>
